domain: sync.velvet-leaf.com
adminDomain: server.sync.velvet-leaf.com

dockerRegistry: dockerhub.divclouds.com
dockerUsername: ""
dockerPassword: ""
dockerEmail: ""
imagePullSecretName: regcred
createImagePullSecret: true

certManager:
  enabled: true
  createClusterIssuer: false
  issuerName: letsencrypt-http01
  issuerKind: ClusterIssuer
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: dxfoso@gmail.com
    privateKeySecretName: sync-admin-web-letsencrypt-account-key
    ingressClassName: nginx

frontend:
  replicas: 2
  image: dockerhub.divclouds.com/microsoft-sql-server-sync/frontend:latest
  backendBaseUrl: /call
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

backend:
  enabled: true
  replicas: 1
  image: dockerhub.divclouds.com/microsoft-sql-server-sync/backend:latest
  service:
    port: 9001
  env:
    truConfigPath: /app/business/tru.json
    truStorageDir: /app/data/storage
    truSpecCachePath: /app/data/.tru_spec_cache.sqlite
  resources:
    requests:
      cpu: 250m
      memory: 768Mi
    limits:
      cpu: "2"
      memory: 2Gi

postgres:
  enabled: true
  image: postgres:16-alpine
  database: sqlsync
  username: tru
  password: tru
  service:
    port: 5432
  persistence:
    size: 10Gi
    storageClassName: ""

persistence:
  enabled: true
  data:
    size: 5Gi
    storageClassName: ""

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/service-upstream: "true"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
  tls:
    frontendSecretName: sync-velvet-leaf-com-letsencrypt-tls
    backendSecretName: server-sync-velvet-leaf-com-letsencrypt-tls
