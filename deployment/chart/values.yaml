domain: sync.velvet-leaf.com
adminDomain: sync.velvet-leaf.com

dockerRegistry: registry.cloud.divclouds.com
dockerUsername: ""
dockerPassword: ""
dockerEmail: ""
imagePullSecretName: regcred
createImagePullSecret: true
imagePullPolicy: Always

nodeSelector: {}
tolerations: []
affinity: {}

syncEngine:
  mode: postgresCustomSync

certManager:
  enabled: true
  createClusterIssuer: false
  issuerName: letsencrypt-http01
  issuerKind: ClusterIssuer
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: dxfoso@gmail.com
    privateKeySecretName: sync-admin-web-letsencrypt-account-key
    ingressClassName: nginx

frontend:
  replicas: 2
  image: registry.cloud.divclouds.com/microsoft-sql-server-sync/frontend:dev
  resources:
    requests:
      cpu: 300m
      memory: 512Mi
    limits:
      cpu: "1500m"
      memory: 1Gi

backend:
  enabled: true
  replicas: 2
  image: registry.cloud.divclouds.com/microsoft-sql-server-sync/backend:dev
  secretName: sql-sync-backend
  service:
    port: 9001
  readinessProbe:
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  livenessProbe:
    initialDelaySeconds: 30
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 6
  env:
    truConfigPath: /app/business/tru.json
    postgresqlUrl: ""
    truStorageDir: /app/data/storage
    truSpecCachePath: /app/data/.tru_spec_cache.sqlite
    truMemoryCapMb: "6144"
    truWasmTimeoutMs: "30000"
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: "2500m"
      memory: 8Gi

postgres:
  enabled: true
  image: docker.io/library/postgres:16-alpine
  secretName: sql-sync-postgres
  database: sqlsync
  username: tru
  password: tru
  service:
    port: 5432
  persistence:
    size: 10Gi
    storageClassName: ""

persistence:
  enabled: true
  data:
    size: 5Gi
    storageClassName: ""

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/client-body-buffer-size: "8m"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/connection-proxy-header: "keep-alive"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "900"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "900"
    nginx.ingress.kubernetes.io/proxy-next-upstream-timeout: "900"
    nginx.ingress.kubernetes.io/proxy-next-upstream: "error timeout http_502 http_503 http_504"
    nginx.ingress.kubernetes.io/proxy-next-upstream-tries: "3"
  tls:
    frontendSecretName: sync-velvet-leaf-com-letsencrypt-tls
    backendSecretName: server-sync-velvet-leaf-com-letsencrypt-tls
