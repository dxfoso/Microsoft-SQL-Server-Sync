namespace: sync-admin-web
domain: sync.velvet-leaf.com

certManager:
  enabled: true
  createClusterIssuer: true
  issuerName: sync-admin-web-letsencrypt
  issuerKind: ClusterIssuer
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: dxfoso@gmail.com
    privateKeySecretName: sync-admin-web-letsencrypt-account-key
    ingressClassName: nginx

frontend:
  image:
    repository: sync-admin-web/frontend
    tag: latest
    pullPolicy: Always
  backendBaseUrl: https://sync.velvet-leaf.com/api
  ingress:
    enabled: true
    className: nginx
    hosts:
      - host: sync.velvet-leaf.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: sync-velvet-leaf-com-letsencrypt-tls
        hosts:
          - sync.velvet-leaf.com

backend:
  enabled: false
  image:
    repository: sync-admin-web/backend
    tag: latest
    pullPolicy: Always
  service:
    port: 9001
  stateFile: /app/data/state.json
