# Resources deploy into the Helm release namespace.
domain: sync.velvet-leaf.com

certManager:
  enabled: true
  createClusterIssuer: false
  issuerName: letsencrypt-http01
  issuerKind: ClusterIssuer
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: dxfoso@gmail.com
    privateKeySecretName: sync-admin-web-letsencrypt-account-key
    ingressClassName: nginx

frontend:
  # Keep this as a string because the cloud deploy runner overrides
  # frontend.image/backend.image as full image refs.
  image: sync-admin-web/frontend:latest
  backendBaseUrl: https://sync.velvet-leaf.com/api
  ingress:
    enabled: true
    className: nginx
    hosts:
      - host: sync.velvet-leaf.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: sync-velvet-leaf-com-letsencrypt-tls
        hosts:
          - sync.velvet-leaf.com

backend:
  enabled: false
  image: sync-admin-web/backend:latest
  service:
    port: 9001
  stateFile: /app/data/state.json
