{{- if .Values.ingress.enabled }}
{{- $backendHost := .Values.adminDomain }}
{{- $sharedBackendHost := eq $backendHost .Values.domain }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "sync-admin-web.fullname" . }}
  namespace: {{ include "sync-admin-web.resourceNamespace" . }}
  labels:
    {{- include "sync-admin-web.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{ include "sync-admin-web.certManagerAnnotationKey" . }}: {{ .Values.certManager.issuerName | quote }}
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  rules:
    - host: {{ .Values.domain | quote }}
      http:
        paths:
          {{- if $sharedBackendHost }}
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: {{ include "sync-admin-web.backendFullname" . }}
                port:
                  number: {{ .Values.backend.service.port }}
          {{- end }}
          - path: /ready
            pathType: Prefix
            backend:
              service:
                name: {{ include "sync-admin-web.backendFullname" . }}
                port:
                  number: {{ .Values.backend.service.port }}
          - path: /bench
            pathType: Prefix
            backend:
              service:
                name: {{ include "sync-admin-web.backendFullname" . }}
                port:
                  number: {{ .Values.backend.service.port }}
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: {{ include "sync-admin-web.backendFullname" . }}
                port:
                  number: {{ .Values.backend.service.port }}
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "sync-admin-web.backendFullname" . }}
                port:
                  number: {{ .Values.backend.service.port }}
          - path: /call
            pathType: Prefix
            backend:
              service:
                name: {{ include "sync-admin-web.backendFullname" . }}
                port:
                  number: {{ .Values.backend.service.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "sync-admin-web.frontendFullname" . }}
                port:
                  number: 80
    {{- if not $sharedBackendHost }}
    - host: {{ $backendHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "sync-admin-web.backendFullname" . }}
                port:
                  number: {{ .Values.backend.service.port }}
    {{- end }}
  tls:
    - secretName: {{ .Values.ingress.tls.frontendSecretName | quote }}
      hosts:
        - {{ .Values.domain | quote }}
    {{- if not $sharedBackendHost }}
    - secretName: {{ .Values.ingress.tls.backendSecretName | quote }}
      hosts:
        - {{ $backendHost | quote }}
    {{- end }}
{{- end }}
