{{- if .Values.autoScheduler.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "sync-admin-web.componentFullname" (list . "auto-tick") }}
  namespace: {{ include "sync-admin-web.resourceNamespace" . }}
  labels:
    {{- include "sync-admin-web.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.autoScheduler.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: {{ .Values.autoScheduler.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.autoScheduler.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      backoffLimit: {{ .Values.autoScheduler.backoffLimit }}
      template:
        metadata:
          labels:
            {{- include "sync-admin-web.labels" . | nindent 12 }}
        spec:
          restartPolicy: Never
          {{- if include "sync-admin-web.usesImagePullSecret" . }}
          imagePullSecrets:
            - name: {{ include "sync-admin-web.registrySecretName" . }}
          {{- end }}
          {{- with .Values.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.affinity }}
          affinity:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
            - name: tick
              image: {{ .Values.autoScheduler.image | quote }}
              imagePullPolicy: IfNotPresent
              env:
                - name: ADMIN_NAME
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.autoScheduler.secretName | quote }}
                      key: {{ .Values.autoScheduler.adminNameKey | quote }}
                - name: ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.autoScheduler.secretName | quote }}
                      key: {{ .Values.autoScheduler.adminPasswordKey | quote }}
                - name: SYNC_URL
                  value: "http://{{ include "sync-admin-web.backendFullname" . }}:{{ .Values.backend.service.port }}/call"
              command: ["python", "-c"]
              args:
                - |
                  import json, os, urllib.request

                  url = os.environ["SYNC_URL"]

                  def call(payload):
                      data = json.dumps(payload).encode("utf-8")
                      request = urllib.request.Request(
                          url,
                          data=data,
                          headers={"Content-Type": "application/json"},
                      )
                      with urllib.request.urlopen(request, timeout=120) as response:
                          return json.loads(response.read().decode("utf-8"))

                  login = call({
                      "name": "auth_login",
                      "args": {
                          "name": os.environ["ADMIN_NAME"],
                          "password": os.environ["ADMIN_PASSWORD"],
                          "app": "web",
                      },
                  })
                  token = login.get("value", {}).get("token")
                  if not token:
                      print(json.dumps(login, sort_keys=True))
                      raise SystemExit(1)

                  result = call({"name": "auto_sync_tick", "args": {"token": token}})
                  print(json.dumps(result, sort_keys=True))
                  if result.get("status") != "success":
                      raise SystemExit(1)
{{- end }}
