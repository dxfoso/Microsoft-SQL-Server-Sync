{{- if .Values.postgres.enabled }}
{{- $namespace := include "sync-admin-web.resourceNamespace" . -}}
{{- $postgresSecretName := include "sync-admin-web.postgresSecretName" . | trim -}}
{{- $existingPostgres := lookup "v1" "Secret" $namespace $postgresSecretName | default dict -}}
{{- $existingPostgresData := get $existingPostgres "data" | default dict -}}
{{- $resolvedPassword := .Values.postgres.password | default "" -}}
{{- $existingPassword := get $existingPostgresData "POSTGRES_PASSWORD" | default "" -}}
{{- if ne $existingPassword "" -}}
{{- $resolvedPassword = ($existingPassword | b64dec) -}}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $postgresSecretName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "sync-admin-web.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ $resolvedPassword | quote }}
{{- end }}
