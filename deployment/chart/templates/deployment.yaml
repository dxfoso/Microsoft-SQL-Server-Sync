apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sync-admin-web.frontendFullname" . }}
  namespace: {{ include "sync-admin-web.resourceNamespace" . }}
  labels:
    {{- include "sync-admin-web.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicas }}
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "sync-admin-web.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        {{- include "sync-admin-web.labels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
    spec:
      {{- if (include "sync-admin-web.usesImagePullSecret" . | trim) }}
      imagePullSecrets:
        - name: {{ include "sync-admin-web.registrySecretName" . }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: frontend
          image: {{ .Values.frontend.image | quote }}
          imagePullPolicy: {{ include "sync-admin-web.imagePullPolicy" . }}
          ports:
            - containerPort: 80
          env:
            - name: BACKEND_BASE_URL
              value: "/call"
          volumeMounts:
            - name: frontend-client-updates
              mountPath: /app/data/client-updates
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /ready
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: frontend-client-updates
          persistentVolumeClaim:
            claimName: {{ include "sync-admin-web.frontendClientUpdatesPvcName" . }}
