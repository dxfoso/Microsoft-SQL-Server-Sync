apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sync-admin-web.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "sync-admin-web.labels" . | nindent 4 }}
spec:
  revisionHistoryLimit: 2
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "sync-admin-web.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "sync-admin-web.labels" . | nindent 8 }}
    spec:
      imagePullSecrets:
        - name: {{ include "sync-admin-web.registrySecretName" . }}
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - containerPort: 80
          env:
            - name: BACKEND_BASE_URL
              value: {{ .Values.frontend.backendBaseUrl | quote }}
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
