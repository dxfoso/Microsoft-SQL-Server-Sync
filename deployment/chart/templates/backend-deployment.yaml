{{- if eq (include "sync-admin-web.backendEnabled" .) "true" }}
{{- $persistence := .Values.persistence | default dict -}}
{{- $stateMountPath := $persistence.mountPath | default "/app/data" -}}
{{- $backend := .Values.backend | default dict -}}
{{- $backendStateFile := $backend.stateFile | default (printf "%s/state.json" $stateMountPath) -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sync-admin-web.backendFullname" . }}
  namespace: {{ include "sync-admin-web.resourceNamespace" . }}
  labels:
    {{- include "sync-admin-web.labels" . | nindent 4 }}
spec:
  {{- if eq (include "sync-admin-web.persistenceEnabled" .) "true" }}
  strategy:
    type: Recreate
  {{- end }}
  revisionHistoryLimit: 2
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "sync-admin-web.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "sync-admin-web.labels" . | nindent 8 }}
        app.kubernetes.io/component: backend
      annotations:
        rollout.sync-admin-web/revision: {{ .Release.Revision | quote }}
        divclouds.com/restartedAt: {{ default (printf "%d" .Release.Revision) .Values.appReleaseDate | quote }}
    spec:
      imagePullSecrets:
        - name: {{ include "sync-admin-web.registrySecretName" . }}
      {{- $backendImage := .Values.backend.image -}}
      {{- if and (not (kindIs "string" $backendImage)) .Values.image .Values.image.repository }}
      {{- $backendRepo := include "sync-admin-web.componentImageRepository" (list .Values.image.repository "backend" .Values.dockerRegistry) -}}
      {{- $backendImage = dict "repository" $backendRepo "tag" .Values.image.tag "pullPolicy" .Values.image.pullPolicy -}}
      {{- end }}
      containers:
        - name: backend
          image: "{{ include "sync-admin-web.imageRef" $backendImage }}"
          imagePullPolicy: {{ include "sync-admin-web.imagePullPolicy" $backendImage }}
          ports:
            - containerPort: {{ .Values.backend.service.port }}
          env:
            - name: PORT
              value: {{ .Values.backend.service.port | quote }}
            - name: STATE_FILE
              value: {{ $backendStateFile | quote }}
          {{- with .Values.backend.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if eq (include "sync-admin-web.persistenceEnabled" .) "true" }}
          volumeMounts:
            - name: state-data
              mountPath: {{ $stateMountPath | quote }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.backend.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.backend.service.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
      {{- if eq (include "sync-admin-web.persistenceEnabled" .) "true" }}
      volumes:
        - name: state-data
          persistentVolumeClaim:
            claimName: {{ include "sync-admin-web.statePvcName" . }}
      {{- end }}
{{- end }}
