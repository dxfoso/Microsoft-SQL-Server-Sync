{{- if .Values.backend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sync-admin-web.backendFullname" . }}
  namespace: {{ include "sync-admin-web.resourceNamespace" . }}
  labels:
    {{- include "sync-admin-web.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicas }}
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "sync-admin-web.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "sync-admin-web.labels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      {{- if (include "sync-admin-web.usesImagePullSecret" . | trim) }}
      imagePullSecrets:
        - name: {{ include "sync-admin-web.registrySecretName" . }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: backend
          image: {{ .Values.backend.image | quote }}
          imagePullPolicy: {{ include "sync-admin-web.imagePullPolicy" . }}
          ports:
            - containerPort: {{ .Values.backend.service.port }}
          env:
            - name: TRU_CONFIG_PATH
              value: {{ .Values.backend.env.truConfigPath | quote }}
            - name: TRU_HOST
              value: "0.0.0.0"
            - name: TRU_PORT
              value: {{ .Values.backend.service.port | quote }}
            - name: TRU_POSTGRESQL_URL
              value: {{ include "sync-admin-web.backendPostgresUrl" . | quote }}
            - name: TRU_STORAGE_DIR
              value: {{ .Values.backend.env.truStorageDir | quote }}
            - name: TRU_SPEC_CACHE_PATH
              value: {{ .Values.backend.env.truSpecCachePath | quote }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          volumeMounts:
            - name: backend-data
              mountPath: /app/data
          readinessProbe:
            httpGet:
              path: /ready
              port: {{ .Values.backend.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ready
              port: {{ .Values.backend.service.port }}
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: backend-data
          persistentVolumeClaim:
            claimName: {{ include "sync-admin-web.backendDataPvcName" . }}
{{- end }}
