{{- if eq (include "sync-admin-web.backendEnabled" .) "true" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sync-admin-web.backendFullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "sync-admin-web.labels" . | nindent 4 }}
spec:
  revisionHistoryLimit: 2
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "sync-admin-web.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "sync-admin-web.labels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      imagePullSecrets:
        - name: {{ include "sync-admin-web.registrySecretName" . }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.service.port }}
          env:
            - name: PORT
              value: {{ .Values.backend.service.port | quote }}
            - name: STATE_FILE
              value: {{ .Values.backend.stateFile | quote }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.backend.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.backend.service.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
{{- end }}
