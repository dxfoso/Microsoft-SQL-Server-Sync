{{- $namespace := include "sync-admin-web.resourceNamespace" . -}}
{{- $backendSecretName := include "sync-admin-web.backendSecretName" . | trim -}}
{{- $existingBackend := lookup "v1" "Secret" $namespace $backendSecretName | default dict -}}
{{- $existingBackendData := get $existingBackend "data" | default dict -}}
{{- $resolvedPostgresUrl := .Values.backend.env.postgresqlUrl | default "" -}}
{{- if eq ($resolvedPostgresUrl | trim) "" -}}
{{- $existingPostgresUrl := get $existingBackendData "TRU_POSTGRESQL_URL" | default "" -}}
{{- if ne $existingPostgresUrl "" -}}
{{- $resolvedPostgresUrl = ($existingPostgresUrl | b64dec) -}}
{{- else if .Values.postgres.enabled -}}
{{- $resolvedPostgresUrl = include "sync-admin-web.backendPostgresUrl" . -}}
{{- else -}}
{{- fail (printf "backend secret %q requires backend.env.postgresqlUrl or an existing TRU_POSTGRESQL_URL value" $backendSecretName) -}}
{{- end -}}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $backendSecretName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "sync-admin-web.labels" . | nindent 4 }}
type: Opaque
stringData:
  TRU_POSTGRESQL_URL: {{ $resolvedPostgresUrl | quote }}
