{{- if and .Values.certManager.enabled (.Values.certManager.createClusterIssuer | default false) }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ include "sync-admin-web.certManagerIssuerName" . }}
  labels:
    {{- include "sync-admin-web.labels" . | nindent 4 }}
spec:
  acme:
    email: {{ .Values.certManager.acme.email | default "dxfoso@gmail.com" | quote }}
    server: {{ .Values.certManager.acme.server | default "https://acme-v02.api.letsencrypt.org/directory" | quote }}
    privateKeySecretRef:
      name: {{ .Values.certManager.acme.privateKeySecretName | default (printf "%s-account-key" (include "sync-admin-web.fullname" .)) }}
    solvers:
      - http01:
          ingress:
            class: {{ .Values.certManager.acme.ingressClassName | default "nginx" | quote }}
{{- end }}
