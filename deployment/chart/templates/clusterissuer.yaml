{{- if and .Values.certManager.enabled .Values.certManager.createClusterIssuer }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.certManager.issuerName | quote }}
  labels:
    {{- include "sync-admin-web.labels" . | nindent 4 }}
spec:
  acme:
    email: {{ .Values.certManager.acme.email | quote }}
    server: {{ .Values.certManager.acme.server | quote }}
    privateKeySecretRef:
      name: {{ .Values.certManager.acme.privateKeySecretName | quote }}
    solvers:
      - http01:
          ingress:
            class: {{ .Values.certManager.acme.ingressClassName | quote }}
{{- end }}
