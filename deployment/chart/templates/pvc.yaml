{{- $persistence := .Values.persistence | default dict -}}
{{- $existingClaim := $persistence.existingClaim | default "" -}}
{{- $annotations := $persistence.annotations | default dict -}}
{{- $retain := true -}}
{{- if hasKey $persistence "retain" -}}
{{- $retain = $persistence.retain -}}
{{- end -}}
{{- if and (eq (include "sync-admin-web.persistenceEnabled" .) "true") (not $existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "sync-admin-web.statePvcName" . }}
  namespace: {{ include "sync-admin-web.resourceNamespace" . }}
  labels:
    {{- include "sync-admin-web.labels" . | nindent 4 }}
  {{- if or $retain $annotations }}
  annotations:
    {{- if $retain }}
    helm.sh/resource-policy: keep
    {{- end }}
    {{- with $annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
spec:
  accessModes:
    {{- range ($persistence.accessModes | default (list "ReadWriteOnce")) }}
    - {{ . | quote }}
    {{- end }}
  resources:
    requests:
      storage: {{ ($persistence.size | default "1Gi") | quote }}
  {{- if $persistence.storageClassName }}
  storageClassName: {{ $persistence.storageClassName | quote }}
  {{- end }}
{{- end }}
