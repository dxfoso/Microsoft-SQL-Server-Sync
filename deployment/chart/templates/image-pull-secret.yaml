{{- $pullSecretName := include "sync-admin-web.registrySecretName" . | trim -}}
{{- $existingPullSecret := dict -}}
{{- if $pullSecretName -}}
{{- $existingPullSecret = lookup "v1" "Secret" (include "sync-admin-web.resourceNamespace" .) $pullSecretName | default dict -}}
{{- end -}}
{{- if and .Values.createImagePullSecret .Values.dockerRegistry .Values.dockerUsername .Values.dockerPassword $pullSecretName (empty $existingPullSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $pullSecretName }}
  namespace: {{ include "sync-admin-web.resourceNamespace" . }}
  labels:
    {{- include "sync-admin-web.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ include "sync-admin-web.registrySecretData" . }}
{{- end }}
