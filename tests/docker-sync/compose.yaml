services:
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SQL_SYNC_TEST_PASSWORD:-SqlSync_Test_2026!}"
      MSSQL_PID: Developer
    ports:
      - "14333:1433"
    healthcheck:
      test:
        - CMD-SHELL
        - /opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -Q "SELECT 1" -b
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s
    volumes:
      - sql-data:/var/opt/mssql

volumes:
  sql-data:
